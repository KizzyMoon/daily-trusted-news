name: Update News Briefing

on:
  schedule:
    - cron: "15 6,12,18 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/update-news.mjs"
      - ".github/workflows/update-news.yml"

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate news.json
        run: node scripts/update-news.mjs

      - name: Commit updated briefing data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "Update daily news briefing"
          git push
